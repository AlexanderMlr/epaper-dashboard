; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
boards_dir = boards
default_envs = T5-ePaper-S3

[env:T5-ePaper-S3]
platform = espressif32@6.5.0
board = T5-ePaper-S3
framework = arduino
upload_speed = 921600
monitor_speed = 115200
build_unflags =
	-std=gnu++11
build_flags =
	-std=gnu++17
	-DBOARD_HAS_PSRAM
	; Set to 0 when powered from battery: no USB host, flashing requires manual BOOT+RESET
	; Set to 1 when developing or debugging to get a serial connection
	-DARDUINO_USB_CDC_ON_BOOT=0
	-DCORE_DEBUG_LEVEL=0
	-DLILYGO_T5_EPD47_S3
extra_scripts = pre:scripts/attach_usb.py
monitor_filters =
	default
	esp32_exception_decoder
lib_deps =
	bblanchon/ArduinoJson@^7.4.1
	https://github.com/Xinyuan-LilyGO/LilyGo-EPD47.git

[env:native]
platform = native
test_framework = unity
test_build_src = yes
lib_deps =
	bblanchon/ArduinoJson@^7.4.1
build_flags =
	-std=c++17
	-Wall
	-Wextra
	-DFIXTURE_DIR='"${PROJECT_DIR}/test/test_ics_parser/fixtures"'
	-DCOMMUTE_FIXTURE_DIR='"${PROJECT_DIR}/test/test_commute_parser/fixtures"'
build_src_filter = +<calendar/ics_parser.cpp> +<commute/commute_parser.cpp>
